<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#020817">
  <title>Night Shift – NOC Operations Dashboard</title>
  <style>
    html,body{margin:0;min-height:100%;background:#020817;color:#f5f9ff;font-family:Tahoma,sans-serif}
    .boot{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}
    .ring{width:52px;height:52px;margin:auto;border:3px solid #073b72;border-top-color:#00e5ff;border-radius:50%;animation:spin .8s linear infinite}
    .msg{margin:16px auto 0;color:#9fc8ee;max-width:680px;line-height:1.65}
    .retry{display:none;margin:18px auto 0;min-height:44px;padding:9px 18px;border:1px solid #00b7ff;border-radius:10px;background:#06234a;color:#fff;font:700 15px Tahoma,sans-serif;cursor:pointer}
    .retry:hover{background:#0a3974;box-shadow:0 0 20px rgba(0,183,255,.25)}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main class="boot" aria-live="polite">
    <div>
      <div class="ring" aria-hidden="true"></div>
      <p class="msg" id="status">กำลังเปิด Night Shift NOC Dashboard…</p>
      <button class="retry" id="retry" type="button">ลองเปิดอีกครั้ง</button>
    </div>
  </main>
  <script>
    (()=>{
      const status=document.getElementById('status');
      const retry=document.getElementById('retry');
      const partNames=Array.from({length:7},(_,i)=>`part-${String(i).padStart(2,'0')}.txt`);
      const remoteSources=[
        'https://cdn.jsdelivr.net/gh/Riptwosec-collab/Night-D1@main/build-parts/',
        'https://raw.githubusercontent.com/Riptwosec-collab/Night-D1/main/build-parts/'
      ];

      function getSources(){
        const sources=[];
        if(location.protocol!=='file:') sources.push(new URL('build-parts/',location.href).href);
        return [...new Set([...sources,...remoteSources])];
      }

      async function fetchEncoded(base){
        status.textContent='กำลังโหลดข้อมูล Dashboard…';
        const responses=await Promise.all(partNames.map(name=>fetch(base+name,{cache:'no-store'})));
        const failed=responses.findIndex(response=>!response.ok);
        if(failed!==-1) throw new Error(`${partNames[failed]} HTTP ${responses[failed].status}`);
        return (await Promise.all(responses.map(response=>response.text()))).join('').replace(/\s/g,'');
      }

      function decodeBase64(encoded){
        const binary=atob(encoded);
        const bytes=new Uint8Array(binary.length);
        for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
        return bytes;
      }

      async function loadPako(){
        if(window.pako) return;
        await new Promise((resolve,reject)=>{
          const script=document.createElement('script');
          script.src='https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js';
          script.onload=resolve;
          script.onerror=()=>reject(new Error('โหลดตัวช่วยแตกไฟล์ไม่สำเร็จ'));
          document.head.append(script);
        });
      }

      async function decompress(bytes){
        if('DecompressionStream' in window){
          const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
          return new Response(stream).text();
        }
        await loadPako();
        return new TextDecoder().decode(window.pako.ungzip(bytes));
      }

      async function boot(){
        retry.style.display='none';
        const errors=[];
        for(const source of getSources()){
          try{
            const encoded=await fetchEncoded(source);
            if(!encoded.startsWith('H4sI')) throw new Error('รูปแบบข้อมูลไม่ถูกต้อง');
            const html=await decompress(decodeBase64(encoded));
            if(!html.includes('<html')||!html.includes('Night Shift')) throw new Error('ไฟล์ Dashboard ไม่สมบูรณ์');
            document.open();
            document.write(html);
            document.close();
            return;
          }catch(error){
            console.warn('Dashboard source failed:',source,error);
            errors.push(error.message);
          }
        }
        status.textContent='เปิด Dashboard ไม่สำเร็จ กรุณากด Ctrl + F5 แล้วลองใหม่ หรือตรวจสอบการเชื่อมต่ออินเทอร์เน็ต';
        retry.style.display='inline-block';
        console.error('Night Shift boot failed:',errors);
      }

      retry.addEventListener('click',boot);
      boot();
    })();
  </script>
</body>
</html>
