<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#020817">
  <title>Night Shift – NOC Operations Dashboard</title>
  <style>
    html,body{margin:0;min-height:100%;background:#020817;color:#f5f9ff;font-family:Tahoma,sans-serif}
    .boot{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}
    .ring{width:52px;height:52px;margin:auto;border:3px solid #073b72;border-top-color:#00e5ff;border-radius:50%;animation:spin .8s linear infinite}
    .msg{margin-top:16px;color:#9fc8ee;max-width:620px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main class="boot" aria-live="polite">
    <div>
      <div class="ring" aria-hidden="true"></div>
      <p class="msg" id="status">กำลังเปิด Night Shift NOC Dashboard…</p>
    </div>
  </main>
  <script>
    (async()=>{
      const status=document.getElementById('status');
      try{
        if(!('DecompressionStream' in window)) throw new Error('เบราว์เซอร์ไม่รองรับ DecompressionStream');
        const remoteBase='https://raw.githubusercontent.com/Riptwosec-collab/Night-D1/main/';
        const base=location.protocol==='file:'?remoteBase:'';
        const files=Array.from({length:7},(_,i)=>`build-parts/part-${String(i).padStart(2,'0')}.txt`);
        const parts=await Promise.all(files.map(async file=>{
          const response=await fetch(base+file,{cache:'no-store'});
          if(!response.ok) throw new Error(`โหลด ${file} ไม่สำเร็จ`);
          return response.text();
        }));
        const encoded=parts.join('').replace(/\s/g,'');
        const binary=atob(encoded);
        const bytes=new Uint8Array(binary.length);
        for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
        const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
        let html=await new Response(stream).text();
        const todoDeletePatch=String.raw`<script>
          STORAGE.todoDeleted='nightShiftV9:todoDeleted';
          function deletedTodoIds(){return new Set(readStorage(STORAGE.todoDeleted,[]))}
          function allTodoItems(){const deleted=deletedTodoIds();return [...DEFAULT_TODO.filter(item=>!deleted.has(item.id)),...readStorage(STORAGE.customTodo,[])]}
          function renderTodoList(){
            const container=$('#todoList');if(!container)return;container.replaceChildren();
            const customIds=new Set(readStorage(STORAGE.customTodo,[]).map(item=>item.id));
            const items=allTodoItems();
            if(!items.length){const empty=create('section',{class:'panel'});const body=create('div',{class:'panel-body'});body.append(create('h3',{},'ยังไม่มีรายการสิ่งที่ต้องทำ'),create('p',{class:'muted'},'เพิ่มรายการใหม่ได้จากแบบฟอร์มด้านขวา'));empty.append(body);container.append(empty);updateTodoProgress();return}
            items.forEach((item,index)=>{
              const isCustom=customIds.has(item.id);
              const article=create('article',{class:'card todo-item v6-todo has-action',dataset:{todoId:item.id}});
              article.append(create('div',{class:'todo-state'},String(index+1)));
              const content=create('div');content.append(create('h3',{},item.title),create('p',{},item.detail||'ไม่มีรายละเอียด'));article.append(content);
              const actions=create('div',{class:'todo-actions'});
              const remove=create('button',{type:'button',class:'btn danger','aria-label':'ลบรายการ '+item.title},'ลบ');
              remove.addEventListener('click',()=>confirmAction('ลบรายการงาน','ต้องการลบ “'+item.title+'” หรือไม่',()=>deleteTodoItem(item.id,isCustom)));
              actions.append(remove);article.append(actions);container.append(article);
            });
            updateTodoProgress();
          }
          function deleteTodoItem(id,isCustom){
            if(isCustom){writeStorage(STORAGE.customTodo,readStorage(STORAGE.customTodo,[]).filter(item=>item.id!==id))}
            else{const deleted=deletedTodoIds();deleted.add(id);writeStorage(STORAGE.todoDeleted,[...deleted])}
            renderTodoList();updateAllProgress();showToast('ลบรายการงานแล้ว','success');
          }
          if(document.querySelector('#todoList'))renderTodoList();
        <\/script>`;
        html=html.replace('</body>',todoDeletePatch+'</body>');
        document.open();
        document.write(html);
        document.close();
      }catch(error){
        console.error(error);
        status.textContent='เปิด Dashboard ไม่สำเร็จ กรุณาใช้ Chrome หรือ Edge เวอร์ชันล่าสุด และตรวจสอบการเชื่อมต่ออินเทอร์เน็ต';
      }
    })();
  </script>
</body>
</html>
